<?xml version="1.0" encoding="UTF-8"?>
<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://downloadit/content/options.css" type="text/css"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:xul="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <link rel="localization" href="downloadit.ftl" />
    <title>DownloadIt</title>
    <script type="application/javascript" src="chrome://downloadit/content/options.js"></script>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">DI</div>
          <div>
            <div class="brand-name">DownloadIt</div>
            <div class="brand-subtitle" data-l10n-id="downloadit-brand-subtitle"></div>
          </div>
        </div>

        <nav class="section-nav" data-l10n-id="downloadit-nav" data-l10n-attrs="aria-label">
          <button class="nav-item is-active" type="button" role="tab" aria-selected="true" aria-controls="section-managers" data-section="managers">
            <span class="nav-number">01</span>
            <span data-l10n-id="downloadit-nav-managers"></span>
          </button>
          <button class="nav-item" type="button" role="tab" aria-selected="false" aria-controls="section-privacy" data-section="privacy">
            <span class="nav-number">02</span>
            <span data-l10n-id="downloadit-nav-privacy"></span>
          </button>
          <button class="nav-item" type="button" role="tab" aria-selected="false" aria-controls="section-about" data-section="about">
            <span class="nav-number">03</span>
            <span data-l10n-id="downloadit-nav-about"></span>
          </button>
        </nav>

        <div class="sidebar-status">
          <span id="sidebar-status-dot" class="status-dot is-pending" aria-hidden="true"></span>
          <span id="sidebar-status" data-l10n-id="downloadit-service-starting"></span>
        </div>
      </aside>

      <main class="main-panel">
        <header class="content-header">
          <div id="section-kicker" class="section-kicker" data-l10n-id="downloadit-manager-kicker"></div>
          <h1 id="section-title" data-l10n-id="downloadit-manager-title"></h1>
          <p id="section-description" data-l10n-id="downloadit-manager-description"></p>
        </header>

        <div class="content-scroll">
          <section id="section-managers" class="settings-section" role="tabpanel" aria-labelledby="section-title" data-section-panel="managers">
            <div class="status-strip">
              <div>
                <div id="manager-count" class="status-strip-value">0</div>
                <div id="manager-count-label" class="status-strip-label" data-l10n-id="downloadit-manager-count-label"></div>
              </div>
              <div id="manager-state" class="status-strip-state" role="status" data-l10n-id="downloadit-detection-idle"></div>
            </div>

            <div class="setting-group">
              <div class="group-heading">
                <div>
                  <div class="eyebrow" data-l10n-id="downloadit-default-manager-eyebrow"></div>
                  <h2 data-l10n-id="downloadit-default-manager-title"></h2>
                </div>
                <span id="default-manager-lock" class="lock-note" hidden="hidden" data-l10n-id="downloadit-locked"></span>
              </div>
              <label class="select-label" for="default-manager" data-l10n-id="downloadit-default-manager-label"></label>
              <div class="select-row">
                <xul:menulist id="default-manager" aria-describedby="default-manager-help">
                  <xul:menupopup id="default-manager-popup" />
                </xul:menulist>
                <button id="refresh-managers" class="secondary-button" type="button">
                  <span class="button-glyph" aria-hidden="true">&#x21bb;</span>
                  <span data-l10n-id="downloadit-refresh-managers"></span>
                </button>
              </div>
              <p id="default-manager-help" class="field-help" data-l10n-id="downloadit-default-manager-help"></p>
            </div>

            <div class="setting-group manager-group">
              <div class="group-heading compact-heading">
                <div>
                  <div class="eyebrow" data-l10n-id="downloadit-available-eyebrow"></div>
                  <h2 data-l10n-id="downloadit-available-title"></h2>
                </div>
              </div>
              <ul id="manager-list" class="manager-list"></ul>
            </div>

            <div class="setting-group manager-group">
              <div class="group-heading compact-heading">
                <div>
                  <div class="eyebrow" data-l10n-id="downloadit-auto-extensions-eyebrow"></div>
                  <h2 data-l10n-id="downloadit-auto-extensions-title"></h2>
                </div>
                <span id="auto-extension-lock" class="lock-note" hidden="hidden" data-l10n-id="downloadit-locked"></span>
              </div>
              <ul id="auto-extension-list" class="manager-list auto-extension-list"></ul>
              <div class="auto-extension-actions">
                <p class="field-help" data-l10n-id="downloadit-auto-extensions-help"></p>
                <button id="clear-auto-extensions" class="secondary-button" type="button" data-l10n-id="downloadit-clear-auto-extensions"></button>
              </div>
            </div>
          </section>

          <section id="section-privacy" class="settings-section" role="tabpanel" aria-labelledby="section-title" data-section-panel="privacy" hidden="hidden">
            <div class="setting-group">
              <div class="group-heading">
                <div>
                  <div class="eyebrow" data-l10n-id="downloadit-privacy-eyebrow"></div>
                  <h2 data-l10n-id="downloadit-privacy-title"></h2>
                </div>
              </div>

              <label class="toggle-row" for="send-cookies">
                <input id="send-cookies" type="checkbox" />
                <span class="toggle-track" aria-hidden="true"><span class="toggle-thumb"></span></span>
                <span class="toggle-copy">
                  <strong data-l10n-id="downloadit-send-cookies-title"></strong>
                  <small data-l10n-id="downloadit-send-cookies-help"></small>
                </span>
              </label>
              <div id="cookie-lock" class="inline-note is-warning" hidden="hidden">
                <span class="note-mark" aria-hidden="true">!</span>
                <span data-l10n-id="downloadit-cookie-locked"></span>
              </div>
            </div>

            <div class="setting-group">
              <div class="group-heading compact-heading">
                <div>
                  <div class="eyebrow" data-l10n-id="downloadit-automatic-eyebrow"></div>
                  <h2 data-l10n-id="downloadit-automatic-title"></h2>
                </div>
              </div>
              <div class="info-list">
                <div class="info-row">
                  <span class="info-mark is-on" aria-hidden="true"></span>
                  <div>
                    <strong data-l10n-id="downloadit-referer-title"></strong>
                    <span data-l10n-id="downloadit-automatic-label"></span>
                  </div>
                </div>
                <div class="info-row">
                  <span class="info-mark is-on" aria-hidden="true"></span>
                  <div>
                    <strong data-l10n-id="downloadit-user-agent-title"></strong>
                    <span data-l10n-id="downloadit-automatic-label"></span>
                  </div>
                </div>
              </div>
              <p class="field-help" data-l10n-id="downloadit-automatic-help"></p>
            </div>
          </section>

          <section id="section-about" class="settings-section" role="tabpanel" aria-labelledby="section-title" data-section-panel="about" hidden="hidden">
            <div class="setting-group">
              <div class="group-heading">
                <div>
                  <div class="eyebrow" data-l10n-id="downloadit-about-eyebrow"></div>
                  <h2 data-l10n-id="downloadit-about-title"></h2>
                </div>
              </div>
              <dl class="diagnostic-list">
                <div class="diagnostic-row">
                  <dt data-l10n-id="downloadit-version-label"></dt>
                  <dd id="addon-version">1.5.6.14.1</dd>
                </div>
                <div class="diagnostic-row">
                  <dt data-l10n-id="downloadit-platform-label"></dt>
                  <dd id="platform-status" data-l10n-id="downloadit-windows"></dd>
                </div>
                <div class="diagnostic-row">
                  <dt data-l10n-id="downloadit-service-label"></dt>
                  <dd id="service-status" data-l10n-id="downloadit-unavailable"></dd>
                </div>
                <div class="diagnostic-row diagnostic-path">
                  <dt data-l10n-id="downloadit-binary-label"></dt>
                  <dd id="binary-path">--</dd>
                </div>
              </dl>
            </div>

            <div class="diagnostic-callout">
              <span class="callout-mark" aria-hidden="true">DI</span>
              <div>
                <strong data-l10n-id="downloadit-about-callout-title"></strong>
                <p data-l10n-id="downloadit-about-callout-help"></p>
              </div>
            </div>
          </section>
        </div>

        <footer class="action-bar">
          <div id="change-state" class="change-state" role="status" data-l10n-id="downloadit-no-changes"></div>
          <div class="action-buttons">
            <button id="cancel" class="text-button" type="button" data-l10n-id="downloadit-cancel"></button>
            <button id="apply" class="primary-button" type="button" disabled="disabled" data-l10n-id="downloadit-apply"></button>
          </div>
        </footer>
      </main>
    </div>
  </body>
</html>
