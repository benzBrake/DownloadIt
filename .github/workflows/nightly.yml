name: Nightly build

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build XPI
        shell: pwsh
        run: .\pack.ps1

      - name: Upload nightly build
        uses: actions/upload-artifact@v4
        with:
          name: DownloadIt-nightly
          path: addon.xpi
          if-no-files-found: error
          retention-days: 7
